name: Build and push image to GHCR

# Builds the Dockerfile and publishes it to GitHub Container Registry (GHCR).
# Runs automatically on every push to main, and can be triggered by hand from
# the Actions tab (workflow_dispatch).

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # required to push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # provided automatically

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # IMPORTANT: image path must be lowercase, even though GitHub shows
          # your username as "Garth-42".
          tags: |
            ghcr.io/garth-42/utde:latest
            ghcr.io/garth-42/utde:${{ github.sha }}
          # RunPod GPUs are x86 — build for amd64 (NOT your Mac's arm64).
          platforms: linux/amd64
          # Cache layers between runs to make rebuilds much faster.
          cache-from: type=gha
          cache-to: type=gha,mode=max
