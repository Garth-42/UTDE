name: Deploy docs + app to GitHub Pages

# Builds the MkDocs site AND the static web app, then deploys both to GitHub
# Pages in a single atomic publish:
#   - docs → https://garth-42.github.io/UTDE/
#   - app  → https://garth-42.github.io/UTDE/app/
#
# ONE-TIME SETUP: in the repo, Settings → Pages → "Build and deployment" →
# Source → "GitHub Actions". This replaces the old mkdocs gh-deploy (branch)
# model; the gh-pages branch is no longer used.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'docs/requirements.txt'
      - 'utde-app/**'
      - 'utde_v0.1.0/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build docs (MkDocs)
        run: |
          pip install -r docs/requirements.txt
          mkdocs build --site-dir site

      - name: Build web app
        working-directory: utde-app
        env:
          # Project-site subpath so assets resolve under /UTDE/app/.
          VITE_BASE: /UTDE/app/
        run: |
          pip install build          # for the toolpath_engine wheel (prebuild)
          npm ci
          npm run build

      - name: Assemble site (docs at root, app under /app)
        run: |
          mkdir -p site/app
          cp -r utde-app/dist/. site/app/
          touch site/.nojekyll      # serve _-prefixed paths / skip Jekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
